<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Panel — Empty / Error States</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="prototype-shell.css">
  <style>
    .states-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
    .state-card { min-height: 320px; }
    @media (max-width: 900px) { .states-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-nav">
      <div class="nav-left">
        <a class="brand" href="index.html">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </div>
          Skill Panel
        </a>
        <nav class="nav-links">
          <a class="nav-link" href="dashboard.html">Dashboard</a>
          <a class="nav-link active" href="library.html">Library</a>
          <a class="nav-link" href="logs.html">Logs</a>
          <a class="nav-link" href="dependencies.html">Dependencies</a>
          <a class="nav-link" href="settings.html">Settings</a>
        </nav>
      </div>
      <div class="nav-right">
        <button class="btn btn-ghost">New Skill</button>
      </div>
    </header>

    <main class="main">
      <div class="page-header">
        <h1 class="page-title">空状态 / 异常状态</h1>
        <p class="page-subtitle">统一 empty、loading、error、权限状态的设计语言</p>
      </div>

      <div class="states-grid">
        <div class="card state-card">
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            </div>
            <h2 class="empty-title">还没有发现 Skill</h2>
            <p class="empty-desc">请先扫描 Skill 根目录，或检查设置中的目录配置是否正确。</p>
            <div class="flex gap-2">
              <button class="btn btn-primary">立即扫描</button>
              <a class="btn btn-text" href="settings.html">打开设置</a>
            </div>
          </div>
        </div>

        <div class="card state-card">
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </div>
            <h2 class="empty-title">无搜索结果</h2>
            <p class="empty-desc">没有找到匹配的 Skill，请尝试其他关键词或清除筛选条件。</p>
            <div class="flex gap-2">
              <button class="btn btn-primary">清除筛选</button>
              <button class="btn btn-text">返回全部</button>
            </div>
          </div>
        </div>

        <div class="card state-card">
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/></svg>
            </div>
            <h2 class="empty-title">正在扫描</h2>
            <p class="empty-desc">正在读取 Skill 目录，请稍候。已处理 12 / 42 个文件。</p>
            <div style="width:200px;height:4px;background:var(--border-color);border-radius:2px;overflow:hidden;margin-top:8px">
              <div style="width:28%;height:100%;background:var(--color-notion-blue)"></div>
            </div>
          </div>
        </div>

        <div class="card state-card" style="border-color:rgba(246,73,50,0.25)">
          <div class="empty-state">
            <div class="empty-icon" style="color:var(--color-coral)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <h2 class="empty-title">目录无法访问</h2>
            <p class="empty-desc">当前没有权限读取 ~/.workbuddy/skills，请检查目录权限或更换根目录。</p>
            <div class="flex gap-2">
              <button class="btn btn-danger-text">重试</button>
              <a class="btn btn-text" href="settings.html">更改目录</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
