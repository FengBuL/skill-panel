<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Panel — New Skill</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="prototype-shell.css">
  <style>
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--color-pure-white); border: 1px solid var(--border-color); border-radius: var(--radius-cards); width: 560px; max-width: 90vw; max-height: 86vh; overflow: hidden; display: flex; flex-direction: column; }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); }
    .modal-title { font-size: 18px; font-weight: 600; margin: 0; }
    .modal-body { padding: 24px; overflow-y: auto; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 10px; }
    .template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
    .template-card { border: 1px solid var(--border-color); border-radius: 8px; padding: 14px; cursor: pointer; text-align: center; transition: border-color 0.15s ease; }
    .template-card:hover { border-color: var(--color-notion-blue); }
    .template-card.selected { border-color: var(--color-notion-blue); background: #fafcff; }
    .template-icon { width: 32px; height: 32px; margin: 0 auto 8px; color: var(--color-notion-blue); }
    .template-icon svg { width: 32px; height: 32px; }
    .template-name { font-size: 13px; font-weight: 600; }
    .template-desc { font-size: 11px; color: var(--color-graphite); margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.6); margin-bottom: 6px; }
    .form-group .input { width: 100%; }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-nav">
      <div class="nav-left">
        <a class="brand" href="index.html">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </div>
          Skill Panel
        </a>
        <nav class="nav-links">
          <a class="nav-link" href="dashboard.html">Dashboard</a>
          <a class="nav-link active" href="library.html">Library</a>
          <a class="nav-link" href="logs.html">Logs</a>
          <a class="nav-link" href="dependencies.html">Dependencies</a>
          <a class="nav-link" href="settings.html">Settings</a>
        </nav>
      </div>
      <div class="nav-right">
        <button class="btn btn-ghost">New Skill</button>
      </div>
    </header>

    <main class="main">
      <div class="page-header">
        <h1 class="page-title">Library</h1>
        <p class="page-subtitle">创建新 Skill 的弹窗流程示意</p>
      </div>
    </main>

    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title">新建 Skill</h2>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Skill 名称</label>
            <input class="input" placeholder="例如：my-custom-skill">
          </div>
          <div class="form-group">
            <label>显示名称</label>
            <input class="input" placeholder="例如：我的自定义 Skill">
          </div>
          <div class="form-group">
            <label>分类</label>
            <input class="input" placeholder="例如：Productivity">
          </div>

          <div class="section-title" style="margin-top:20px">选择模板</div>
          <div class="template-grid">
            <div class="template-card selected">
              <div class="template-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
              <div class="template-name">空白模板</div>
              <div class="template-desc">从空 SKILL.md 开始</div>
            </div>
            <div class="template-card">
              <div class="template-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg></div>
              <div class="template-name">API 调用</div>
              <div class="template-desc">封装一个外部 API</div>
            </div>
            <div class="template-card">
              <div class="template-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10"/></svg></div>
              <div class="template-name">AI 助手</div>
              <div class="template-desc">基于 LLM 的辅助能力</div>
            </div>
          </div>

          <div class="section-title" style="margin-top:20px">AI 辅助创建</div>
          <p class="text-sm text-secondary mb-3">输入一句话描述，AI 可生成初稿，但仍需你审阅和确认。</p>
          <textarea class="textarea" placeholder="例如：帮我创建一个能查询本地天气的 Skill"></textarea>
          <button class="btn btn-text mt-3" style="width:100%">用 AI 生成初稿</button>
        </div>
        <div class="modal-footer">
          <a class="btn btn-text" href="library.html">取消</a>
          <a class="btn btn-primary" href="editor.html">创建并编辑</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
