name: Desktop Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - codex/skill-panel-app
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows NSIS
            os: windows-latest
            build-command: npm run tauri:build:windows
            artifact-name: skill-panel-windows-nsis
            artifact-path: src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS App and DMG
            os: macos-latest
            build-command: npm run tauri:build:macos
            artifact-name: skill-panel-macos
            artifact-path: |
              src-tauri/target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure macOS temp directory
        if: runner.os == 'macOS'
        run: |
          mkdir -p "$RUNNER_TEMP/rusttmp"
          echo "TMPDIR=$RUNNER_TEMP/rusttmp" >> "$GITHUB_ENV"
          echo "TMP=$RUNNER_TEMP/rusttmp" >> "$GITHUB_ENV"
          echo "TEMP=$RUNNER_TEMP/rusttmp" >> "$GITHUB_ENV"

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Check packaging config
        run: npm run packaging:check

      - name: Run Rust tests
        run: npm run cargo:test

      - name: Build frontend
        run: npm run build

      - name: Build desktop artifact
        run: ${{ matrix.build-command }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
